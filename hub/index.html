<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    #menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 10px;
      color: #fff;
      margin-bottom: 1rem;
    }

    .games {
      display: flex;
      gap: 3rem;
    }

    .card {
      border: 2px solid #333;
      padding: 2.5rem 3rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      width: 220px;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card.banana { border-color: #b8860b; }
    .card.banana:hover { border-color: #ffd700; box-shadow: 0 0 20px rgba(184,134,11,0.4); }

    .card.snake { border-color: #22c55e; }
    .card.snake:hover { border-color: #4ade80; box-shadow: 0 0 20px rgba(34,197,94,0.4); }

    .card.tetris { border-color: #3b82f6; }
    .card.tetris:hover { border-color: #60a5fa; box-shadow: 0 0 20px rgba(59,130,246,0.4); }
    .card.tetris .name { color: #3b82f6; }

    .card .emoji { font-size: 3rem; margin-bottom: 1rem; }

    .card .name {
      font-size: 1rem;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
    }

    .card.banana .name { color: #b8860b; }
    .card.snake .name { color: #22c55e; }

    .card .hint { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

    #frame-view {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
    }

    #back-bar {
      background: #111;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    #back-btn {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 16px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 2px;
    }

    #back-btn:hover { border-color: #888; color: #fff; }

    #game-label { color: #555; font-size: 0.8rem; letter-spacing: 3px; }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
    }
  </style>
</head>
<body>

  <div id="menu">
    <h1>🎮 GAME HUB</h1>
    <div class="games">
      <div class="card banana" onclick="openGame('Banana Invaders', 'http://localhost:5173')">
        <div class="emoji">🍌</div>
        <div class="name">BANANA INVADERS</div>
        <div class="hint">Arrow keys · Space to shoot</div>
      </div>
      <div class="card snake" onclick="openGame('Bonbon the Banana Snake', 'http://localhost:5174')">
        <div class="emoji">🐍</div>
        <div class="name">BANANA SNAKE</div>
        <div class="hint">Arrow keys to move</div>
      </div>
      <div class="card tetris" onclick="openGame('Tetris', 'http://localhost:5175')">
        <div class="emoji">🟦</div>
        <div class="name">TETRIS</div>
        <div class="hint">Arrow keys · Space to drop</div>
      </div>
    </div>
  </div>

  <div id="frame-view">
    <div id="back-bar">
      <button id="back-btn" onclick="goBack()">← BACK</button>
      <span id="game-label"></span>
    </div>
    <iframe id="game-frame" src=""></iframe>
  </div>

  <script>
    function openGame(name, url) {
      document.getElementById('game-label').textContent = name.toUpperCase()
      document.getElementById('game-frame').src = url
      document.getElementById('menu').style.display = 'none'
      const fv = document.getElementById('frame-view')
      fv.style.display = 'flex'
    }

    function goBack() {
      document.getElementById('game-frame').src = ''
      document.getElementById('frame-view').style.display = 'none'
      document.getElementById('menu').style.display = 'flex'
    }
  </script>

</body>
</html>
